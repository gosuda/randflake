name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Test Go
        run: go test -v ./...

  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Compile Python
        run: python -m compileall -q src/randflake

      - name: Test Python
        run: python -m unittest discover -s src/randflake -t src

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install TypeScript dependencies
        run: bash .github/scripts/npm-ci-with-logs.sh

      - name: Build TypeScript
        run: npm run build

      - name: Test TypeScript
        run: npm test

  jsr:
    name: JSR dry run
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install TypeScript dependencies
        run: bash .github/scripts/npm-ci-with-logs.sh

      - name: Build workspace dependency
        run: npm run build --workspace sparx64

      - name: Verify sparx64 JSR package
        working-directory: src/randflake-ts/sparx64
        run: npx --no-install jsr publish --dry-run

      - name: Verify randflake JSR package
        working-directory: src/randflake-ts/randflake
        run: npx --no-install jsr publish --dry-run
